services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: vrg-transport-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3000
      - MONGODB_URI=mongodb://${MONGODB_USER}:${MONGODB_PASSWORD}@mongodb:27017/${MONGODB_DATABASE}?authSource=admin
      - MONGODB_IMAGE_URI=mongodb://${MONGODB_IMAGE_USER}:${MONGODB_IMAGE_PASSWORD}@mongodb-images:27017/${MONGODB_IMAGE_DATABASE}?authSource=admin
    depends_on:
      mongodb:
        condition: service_healthy
      mongodb-images:
        condition: service_healthy
    networks:
      - vrg-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  mongodb:
    image: mongo:7-jammy
    container_name: vrg-transport-mongodb
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGODB_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGODB_PASSWORD}
      - MONGO_INITDB_DATABASE=${MONGODB_DATABASE}
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - vrg-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    # Segurança: não roda como root
    user: mongodb
    command: mongod --auth

  mongodb-images:
    image: mongo:7-jammy
    container_name: vrg-transport-mongodb-images
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${MONGODB_IMAGE_PORT:-27018}:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGODB_IMAGE_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGODB_IMAGE_PASSWORD}
      - MONGO_INITDB_DATABASE=${MONGODB_IMAGE_DATABASE}
    volumes:
      - mongodb_images_data:/data/db
      - mongodb_images_config:/data/configdb
    networks:
      - vrg-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    # Segurança: não roda como root
    user: mongodb
    command: mongod --auth

volumes:
  mongodb_data:
    driver: local
    name: vrg-transport-mongodb-data
  mongodb_config:
    driver: local
    name: vrg-transport-mongodb-config
  mongodb_images_data:
    driver: local
    name: vrg-transport-mongodb-images-data
  mongodb_images_config:
    driver: local
    name: vrg-transport-mongodb-images-config

networks:
  vrg-network:
    driver: bridge
    name: vrg-transport-network